name: Refresh NEON data bundle

# Monthly rebuild of the per-site phenology .rds bundles (data/sites/*.rds) + the
# indexes (data/site_index.rds, data/national_onsets.rds), committed to master —
# which AUTO-REDEPLOYS the Posit Connect Cloud app (git-backed). NEON publishes on
# a lag, so a monthly pull keeps the bundled "database" current.
#
# Runs late on the FIRST SATURDAY NIGHT of each month (~11pm Arizona) so the
# redeploy lands off-peak. Also runnable on demand from the Actions tab
# (workflow_dispatch); tick "skip_download" to re-bundle the committed raw without
# a full NEON re-pull (only useful if raw is present — normally leave unticked).
#
# REQUIRES one repo secret (Settings -> Secrets and variables -> Actions):
#   NEON_TOKEN   your NEON API token (https://data.neonscience.org/myaccount)
# Without it the fetch still runs but is rate-limited.

on:
  schedule:
    # Every Sunday 06:00 UTC == Saturday 23:00 America/Phoenix (Arizona, no DST).
    # Cron can't express "first Saturday", so fire every Saturday night and let
    # the gate job proceed only on the first one.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      skip_download:
        description: "Skip the NEON re-pull and re-bundle the committed raw (fast)"
        type: boolean
        default: false

permissions:
  contents: write          # commit the refreshed bundles to master (triggers Connect Cloud redeploy)

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."; echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          dow=$(TZ='America/Phoenix' date +%u)    # 6 = Saturday
          day=$(TZ='America/Phoenix' date +%-d)   # day-of-month, no leading zero
          if [ "$dow" = "6" ] && [ "$day" -le 7 ]; then
            echo "First Saturday in Arizona (day $day) — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not the first Saturday in Arizona (dow=$dow day=$day) — skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: gate
    if: needs.gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: >
            neonUtilities, dplyr, tibble, tidyr, stringr, RColorBrewer

      - name: Fetch all NEON terrestrial phenology sites (full re-pull)
        if: ${{ github.event.inputs.skip_download != 'true' }}
        env:
          NEON_TOKEN: ${{ secrets.NEON_TOKEN }}
        run: Rscript scripts/fetch_all_phe.R

      - name: Rebuild per-site bundles + indexes + national table (full)
        if: ${{ github.event.inputs.skip_download != 'true' }}
        run: Rscript scripts/bundle_phe_data.R

      # skip_download fast path: NO NEON pull. Rebuild ONLY the derived indexes
      # (site_index + national_onsets) from the committed data/sites/*.rds bundles.
      # This is the deploy-safe pipeline self-test — if it pushes nothing, the
      # committed bundles are already current; it never dies on a missing raw.
      - name: Rebuild derived indexes from committed bundles (skip_download fast path)
        if: ${{ github.event.inputs.skip_download == 'true' }}
        run: Rscript scripts/rebuild_indexes.R

      - name: Commit refreshed data to master (auto-redeploys Connect Cloud)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # a prior bot run (or another session) may have pushed; rebase local
          # onto the remote first or the push below is rejected.
          git fetch origin master
          git pull --rebase --autostash origin master || true
          # commit ONLY the data artifacts by EXPLICIT path — never a blanket add
          # that could sweep in a gitignored sibling or another job's half-written
          # file. Skip cleanly if nothing changed.
          git add data/sites data/site_index.rds data/national_onsets.rds data-sample/demo.rds
          if git diff --cached --quiet; then
            echo "No data changes this run — nothing to commit."
          else
            git commit -m "data: monthly NEON phenology refresh (DP1.10055.001) [bot]"
            git push origin HEAD:master
            echo "Pushed refreshed data — Connect Cloud will auto-redeploy."
          fi
